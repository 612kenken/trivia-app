name: Daily Trivia Scraper

on:
  schedule:
    # 毎日日本時間の朝7:00 (UTCの22:00) に実行
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行用ボタンも有効化

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scraper
        run: node scripts/scraper.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/scraped_trivia.json
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update daily trivia data" && git push)
